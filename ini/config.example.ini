; Copy to:
; - ini/config_local.ini for local development
; - ini/config.ini for production

; =========================
; DATABASE
; =========================
host = 127.0.0.1
port = 3306
dbname = xqanto_cz_main
user = your_user
password = your_password
type = mysql

; =========================
; ADMIN SESSION
; =========================
user_admin =
password_admin =
project_session_name = QANTO_SHARED_SESSID
admin_session_namespace = qanto_admin

; =========================
; SMTP
; =========================
smtp_server = smtp.example.com
smtp_port = 465
smtp_secure = ssl
smtp_user = user@example.com
smtp_password = your_smtp_password
smtp_from = no-reply@example.com
smtp_from_name = Qanto shared admin

; =========================
; CRON
; =========================
cron_token = generate_a_random_secret_token
